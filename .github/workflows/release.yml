name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            artifact: etale-darwin-arm64
            ext: ''
          - os: macos-13
            artifact: etale-darwin-x64
            ext: ''
          - os: ubuntu-latest
            artifact: etale-linux-x64
            ext: ''
          - os: windows-latest
            artifact: etale-win32-x64.exe
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - shell: bash
        run: cp "target/release/etale${{ matrix.ext }}" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            etale-darwin-arm64/etale-darwin-arm64
            etale-darwin-x64/etale-darwin-x64
            etale-linux-x64/etale-linux-x64
            etale-win32-x64.exe/etale-win32-x64.exe

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
